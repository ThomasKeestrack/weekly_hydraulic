<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Maintenance — Keestrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #F39200;
    --ink: #1a1a1a;
    --ink-soft: #555;
    --paper: #fafafa;
    --line: #e3e3e3;
    --warn: #b34700;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  html { scroll-padding-top: 8px; -webkit-text-size-adjust: 100%; }

  body {
    font-family: "Ubuntu", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.5;
    font-size: 16px;
  }

  header {
    background: var(--ink);
    color: #fff;
    padding: 20px 18px 18px;
    border-bottom: 4px solid var(--orange);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .brand-mark {
    width: 36px; height: 36px;
    background: var(--orange);
    color: var(--ink);
    font-weight: 900;
    display: grid; place-items: center;
    border-radius: 5px;
    font-size: 16px;
  }
  .brand-text .kicker {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--orange);
    font-weight: 700;
    display: block;
  }
  .brand-text h1 {
    margin: 2px 0 0;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.25;
  }
  .brand-text h1 .model {
    white-space: nowrap;
    letter-spacing: 0.3px;
  }
  .brand-text h1 .elec {
    color: var(--orange);
    font-weight: 800;
  }

  .lang-selector {
    position: relative;
    display: inline-block;
    width: 100%;
    max-width: 260px;
  }
  .lang-btn {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 9px 12px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1.2;
    transition: all .15s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #fff;
    font-family: inherit;
    font-weight: 600;
    text-align: left;
  }
  .lang-btn:hover { border-color: var(--orange); }
  .lang-btn.open {
    border-color: var(--orange);
    background: rgba(243,146,0,0.12);
  }
  .lang-btn .lang-flag {
    font-size: 18px;
    line-height: 1;
    flex-shrink: 0;
  }
  .lang-btn .lang-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lang-btn .lang-arrow {
    color: var(--orange);
    font-size: 12px;
    transition: transform .2s ease;
    flex-shrink: 0;
  }
  .lang-btn.open .lang-arrow { transform: rotate(180deg); }

  .lang-panel {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    max-height: 280px;
    overflow-y: auto;
    z-index: 20;
    display: none;
    -webkit-overflow-scrolling: touch;
  }
  .lang-panel.open { display: block; }
  .lang-option {
    width: 100%;
    border: none;
    background: transparent;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    text-align: left;
    border-bottom: 1px solid var(--line);
  }
  .lang-option:last-child { border-bottom: none; }
  .lang-option:hover { background: #fff7e6; }
  .lang-option.active {
    background: #fff7e6;
    color: var(--ink);
    font-weight: 700;
  }
  .lang-option.active::after {
    content: "✓";
    margin-left: auto;
    color: var(--orange);
    font-weight: bold;
  }
  .lang-option .lang-flag { font-size: 18px; line-height: 1; flex-shrink: 0; }

  main {
    padding: 18px;
    max-width: 720px;
    margin: 0 auto;
  }

  .section {
    margin-bottom: 26px;
  }
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--orange);
    flex-wrap: wrap;
  }
  .section-num {
    font-size: 20px;
    font-weight: 900;
    color: var(--orange);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .section-title {
    font-size: 16px;
    font-weight: 700;
    margin: 0;
    flex: 1;
    min-width: 0;
  }
  .section-note {
    font-size: 12px;
    color: var(--warn);
    font-weight: 600;
    font-style: italic;
    flex-basis: 100%;
    margin-top: -2px;
  }

  ul.items {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  ul.items li {
    padding: 10px 0 10px 22px;
    border-bottom: 1px solid var(--line);
    font-size: 15px;
    line-height: 1.5;
    color: #222;
    position: relative;
  }
  ul.items li::before {
    content: "";
    position: absolute;
    left: 4px;
    top: 19px;
    width: 6px;
    height: 6px;
    background: var(--orange);
    border-radius: 50%;
  }
  ul.items li:last-child { border-bottom: none; }

  ul.legend {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    gap: 2px;
  }
  ul.legend li {
    display: grid;
    grid-template-columns: 52px 1fr;
    gap: 12px;
    align-items: baseline;
    padding: 9px 0;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
    line-height: 1.45;
    color: #222;
  }
  ul.legend li:last-child { border-bottom: none; }
  ul.legend li .tag {
    margin: 0;
    text-align: center;
    width: 100%;
    padding: 3px 0;
    vertical-align: baseline;
  }
  main[dir="rtl"] ul.legend li .tag { margin: 0; }

  .tag {
    display: inline-block;
    background: var(--ink);
    color: var(--orange);
    font-weight: 800;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 2px 6px;
    border-radius: 3px;
    margin-right: 6px;
    vertical-align: 2px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  footer {
    text-align: center;
    padding: 18px;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  main[dir="rtl"] .tag { margin-right: 0; margin-left: 6px; }
  main[dir="rtl"] ul.items li { padding: 10px 22px 10px 0; }
  main[dir="rtl"] ul.items li::before { left: auto; right: 4px; }
  /* ---- Refined header layout ---- */
  header {
    padding: 22px 20px 18px;
  }
  .brand { align-items: flex-start; }
  .brand-text { flex: 1; min-width: 0; }
  .interval-badge {
    display: inline-block;
    margin-top: 6px;
    background: var(--orange);
    color: var(--ink);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 9px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .header-controls {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  .header-controls .lang-selector { flex: 1; max-width: 260px; }
  .print-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 9px 14px;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s ease;
    white-space: nowrap;
  }
  .print-btn:hover {
    border-color: var(--orange);
    background: rgba(243,146,0,0.12);
  }
  .print-btn .print-ico { font-size: 16px; line-height: 1; color: var(--orange); }

  /* ---- Refined sections & rows ---- */
  main { padding: 22px 18px 8px; }
  .section { margin-bottom: 30px; }
  .section-header {
    align-items: center;
    gap: 12px;
    padding-bottom: 8px;
  }
  .section-num {
    background: var(--ink);
    color: var(--orange);
    width: 30px; height: 30px;
    display: grid; place-items: center;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 800;
  }
  .section-title { letter-spacing: 0.2px; }
  ul.items li {
    padding: 11px 0 11px 24px;
    color: #2a2a2a;
  }
  ul.items li:hover { background: rgba(243,146,0,0.04); }
  ul.items li::before { top: 20px; }

  /* ---- Refined footer ---- */
  footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 26px 18px;
    margin-top: 14px;
    border-top: 1px solid var(--line);
    text-transform: none;
    letter-spacing: 0;
  }
  .foot-brand {
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink);
  }
  .foot-meta { font-size: 11px; color: var(--ink-soft); }

  /* ---- Print / PDF ---- */
  @media print {
    :root { --paper: #fff; }
    @page { margin: 16mm 14mm; }
    html, body {
      background: #fff;
      font-size: 11pt;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    header {
      position: static;
      background: #fff;
      color: var(--ink);
      border-bottom: 3px solid var(--orange);
      padding: 0 0 12px;
      margin-bottom: 16px;
    }
    .brand-mark { background: var(--orange); color: #fff; }
    .brand-text .kicker { color: var(--warn); }
    .brand-text h1 { color: var(--ink); font-size: 18pt; }
    .brand-text h1 .elec { color: var(--orange); }
    .header-controls, .lang-selector, .print-btn { display: none !important; }
    .interval-badge { border: 1px solid var(--orange); }
    main { padding: 0; max-width: none; }
    .note-banner { margin: 0 0 16px; }
    .section { margin-bottom: 18px; break-inside: avoid; page-break-inside: avoid; }
    .section-header { break-after: avoid; page-break-after: avoid; }
    .section-num { border: 1px solid var(--ink); }
    ul.items li, ul.legend li { break-inside: avoid; page-break-inside: avoid; }
    ul.items li:hover { background: none; }
    footer {
      border-top: 1px solid var(--line);
      margin-top: 20px;
    }
  }
</style>

<style>
  /* ===== Model selection screen ===== */
  #modelScreen {
    min-height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: var(--paper);
  }
  #modelScreen.hidden { display: none; }

  /* Language selector on the model-selection screen (light background) */
  .ms-lang {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 30;
  }
  .ms-lang .lang-selector { width: auto; max-width: none; }
  .ms-lang .lang-btn {
    width: auto;
    min-width: 150px;
    background: #fff;
    border: 1.5px solid var(--line);
    color: var(--ink);
  }
  .ms-lang .lang-btn .lang-arrow { color: var(--orange); }
  .ms-lang .lang-btn:hover { border-color: var(--orange); }
  .ms-lang .lang-btn.open {
    border-color: var(--orange);
    background: #fff7e6;
  }
  .ms-lang .lang-panel { left: auto; right: 0; min-width: 200px; }
  @media (max-width: 360px) {
    .ms-lang .lang-btn { min-width: 0; }
    .ms-lang .lang-btn .lang-name { display: none; }
  }
  .ms-brand {
    display: flex; align-items: center; gap: 14px; margin-bottom: 34px;
  }
  .ms-brand .brand-mark { width: 48px; height: 48px; font-size: 22px; border-radius: 7px; }
  .ms-brand .ms-titles .kicker {
    font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--warn); font-weight: 700; display:block;
  }
  .ms-brand .ms-titles h1 { margin: 3px 0 0; font-size: 20px; font-weight: 700; }
  .ms-prompt { text-align: center; margin-bottom: 26px; }
  .ms-prompt h2 { margin: 0 0 6px; font-size: 19px; font-weight: 700; color: var(--ink); }
  .ms-prompt p  { margin: 0; font-size: 14px; color: var(--ink-soft); max-width: 360px; }
  .model-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 14px;
    width: 100%;
    max-width: 480px;
  }
  .model-card {
    appearance: none;
    border: 2px solid var(--line);
    background: #fff;
    border-radius: 12px;
    padding: 22px 14px;
    cursor: pointer;
    font-family: inherit;
    text-align: center;
    transition: all .15s ease;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .model-card:hover, .model-card:focus-visible {
    border-color: var(--orange);
    box-shadow: 0 6px 18px rgba(243,146,0,0.18);
    transform: translateY(-2px);
    outline: none;
  }
  .model-card:active { transform: translateY(0); }
  .model-card .mc-name {
    font-size: 26px; font-weight: 800; color: var(--ink);
    letter-spacing: 0.5px;
  }
  .model-card .mc-name .elec { color: var(--orange); }
  .model-card .mc-tag {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--ink-soft); font-weight: 600;
  }
  .model-card.pending { opacity: 0.72; }
  .model-card.pending .mc-tag { color: var(--warn); }

  /* ===== Model pill in header (change model) ===== */
  .model-pill {
    display: inline-flex; align-items: center; gap: 7px;
    margin-top: 8px;
    background: var(--orange);
    color: var(--ink);
    border: none;
    border-radius: 20px;
    padding: 5px 12px 5px 14px;
    font-family: inherit;
    font-size: 13px; font-weight: 800;
    letter-spacing: 0.4px;
    cursor: pointer;
    transition: all .15s ease;
  }
  .model-pill .mp-elec { color: #fff; }
  .model-pill .mp-swap {
    font-size: 13px; line-height: 1;
    opacity: 0.85;
  }
  .model-pill:hover { filter: brightness(1.05); box-shadow: 0 3px 10px rgba(243,146,0,0.4); }
  .model-pill:active { filter: brightness(0.96); }

  /* hide app shell until a model is picked */
  #appShell.hidden { display: none; }

  /* ===== Qty badge for lubrication ===== */
  ul.items li .qty-badge {
    display: inline-block;
    margin-left: 8px;
    background: #fff;
    border: 1.5px solid var(--orange);
    color: var(--warn);
    font-size: 11px; font-weight: 800;
    padding: 1px 8px;
    border-radius: 10px;
    white-space: nowrap;
    vertical-align: 1px;
    font-variant-numeric: tabular-nums;
  }
  main[dir="rtl"] ul.items li .qty-badge { margin-left: 0; margin-right: 8px; }

  /* small inline "standard timing" note */
  .li-note {
    color: var(--warn); font-style: italic; font-weight: 600; font-size: 12px;
  }

  /* ===== Coming soon placeholder ===== */
  .coming-soon {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);
  }
  .coming-soon .cs-ico { font-size: 46px; margin-bottom: 14px; }
  .coming-soon h2 { margin: 0 0 8px; font-size: 18px; color: var(--ink); font-weight: 700; }
  .coming-soon p  { margin: 0; font-size: 14px; }

  @media print {
    .model-pill { display: none !important; }
    #modelScreen { display: none !important; }
  }
</style>

</head>
<body>

<!-- ===================== MODEL SELECTION SCREEN ===================== -->
<div id="modelScreen">
  <div class="ms-lang">
    <div class="lang-selector" id="msLangSelector">
      <button class="lang-btn" id="msLangBtn" type="button" aria-haspopup="listbox" aria-expanded="false">
        <span class="lang-flag" id="msCurrentFlag">🇬🇧</span>
        <span class="lang-name" id="msCurrentName">English</span>
        <span class="lang-arrow">▾</span>
      </button>
      <div class="lang-panel" id="msLangPanel" role="listbox"></div>
    </div>
  </div>
  <div class="ms-brand">
    <div class="brand-mark">K</div>
    <div class="ms-titles">
      <span class="kicker">Keestrack</span>
      <h1 data-i18n="page_title">Weekly Maintenance — Keestrack</h1>
    </div>
  </div>
  <div class="ms-prompt">
    <h2 data-i18n="model_select_title">Select Machine Model</h2>
    <p data-i18n="model_select_sub">Choose the machine to display its weekly maintenance schedule</p>
  </div>
  <div class="model-grid" id="modelGrid"></div>
</div>

<!-- ===================== APP SHELL ===================== -->
<div id="appShell" class="hidden">
<header>
  <div class="brand">
    <div class="brand-mark">K</div>
    <div class="brand-text">
      <span class="kicker" data-i18n="kicker">Maintenance Schedule</span>
      <h1>
        <span data-i18n="page_title">Weekly Maintenance — Keestrack</span>
        <span class="model" id="headerModel"></span>
      </h1>
      <button class="model-pill" id="modelPill" type="button">
        <span id="pillName"></span>
        <span class="mp-swap" aria-hidden="true">⇄</span>
        <span data-i18n="change_model" style="font-weight:700;">Change model</span>
      </button>
    </div>
    <span class="interval-badge" data-i18n="interval">40 h · Weekly</span>
  </div>
  <div class="header-controls">
    <div class="lang-selector">
      <button class="lang-btn" id="langBtn" type="button" aria-haspopup="listbox" aria-expanded="false">
        <span class="lang-flag" id="currentFlag">🇬🇧</span>
        <span class="lang-name" id="currentName">English</span>
        <span class="lang-arrow">▾</span>
      </button>
      <div class="lang-panel" id="langPanel" role="listbox"></div>
    </div>
    <button class="print-btn" id="printBtn" type="button" title="Print / PDF" aria-label="Print">
      <span class="print-ico" aria-hidden="true">⎙</span>
      <span class="print-label" data-i18n="print">Print / PDF</span>
    </button>
  </div>
</header>

<main id="mainContent"></main>

<footer>
  <span class="foot-brand">Keestrack</span>
  <span class="foot-meta"><span data-i18n="doc_ref">Maintenance schedule · 40 h</span> · <span id="footModel"></span> · Rev. 01</span>
</footer>
</div>

<script>

const LANGS = [
  { code: 'en', flag: '🇬🇧', label: 'English',    dir: 'ltr' },
  { code: 'it', flag: '🇮🇹', label: 'Italiano',   dir: 'ltr' },
  { code: 'es', flag: '🇪🇸', label: 'Español',    dir: 'ltr' },
  { code: 'de', flag: '🇩🇪', label: 'Deutsch',    dir: 'ltr' },
  { code: 'fr', flag: '🇫🇷', label: 'Français',   dir: 'ltr' },
  { code: 'nl', flag: '🇳🇱', label: 'Nederlands', dir: 'ltr' },
  { code: 'pt', flag: '🇵🇹', label: 'Português',  dir: 'ltr' },
  { code: 'no', flag: '🇳🇴', label: 'Norsk',      dir: 'ltr' },
  { code: 'ro', flag: '🇷🇴', label: 'Română',     dir: 'ltr' },
  { code: 'pl', flag: '🇵🇱', label: 'Polski',     dir: 'ltr' },
  { code: 'cs', flag: '🇨🇿', label: 'Čeština',    dir: 'ltr' },
  { code: 'ru', flag: '🇷🇺', label: 'Русский',    dir: 'ltr' },
  { code: 'zh', flag: '🇨🇳', label: '中文',         dir: 'ltr' },
  { code: 'hi', flag: '🇮🇳', label: 'हिन्दी',         dir: 'ltr' },
  { code: 'ar', flag: '🇸🇦', label: 'العربية',     dir: 'rtl' },
  { code: 'he', flag: '🇮🇱', label: 'עברית',      dir: 'rtl' }
];

const T = {
  en: { kicker:"Maintenance Schedule", page_title:"Weekly Maintenance — Keestrack",
    sec_belt:"Belt Conveyors", sec_magnet:"Magnet", sec_crusher:"Crushing Chamber & Hoppers",
    sec_cleaning:"Cleaning", sec_lube:"Lubrication", sec_func:"Functional Checks", sec_general:"General",
    note_if_installed:"— if installed", note_no_autogrease:"— only without automatic greasing system",
    belt_1:"Check the cleanliness and rotation of belt rollers and return rollers.",
    belt_2:"Check belt centering and wear of skirting rubber.",
    belt_3:"Check the wear of scrapers and the overall condition of the belts.",
    mag_1:"Check the cleanliness and rotation of belt rollers.",
    mag_2:"Check belt wear and centering.",
    mag_3:"Check the wear of the chute.",
    cru_1:"Check the wear level and fastening of parts on the JCR crushing chamber, on the FEH and VIF, and on discharge hoppers.",
    cru_2:"Visually check the pressure level on the retraction cylinder.",
    cru_3:"Listen for abnormal noises during setting adjustment.",
    cru_4:"Check wear uniformity on the toggle plate.",
    cln_1:"Clean the machine and coolers with a water jet or compressed air.",
    cln_2:"Clean the elements on the vent valve of the water pump.",
    cln_3:"Clean the stockpile sensor.",
    cln_4:"Clean the hydraulic block — compressed air only.",
    lub_1:"Lubricate all 4 bearings (340 g per bearing).",
    lub_2:"Lubricate the drive head (10 g + 10 g).",
    lub_3:"Lubricate the return head (10 g + 10 g).",

// ===== Machine models =====
// Each model lists its sections. Section = {key:i18nKey for title, note?:i18nKey, items:[...]}
// item = { i18n:key, tag?:"JCR", qty?:"5g (2x)", note?:"tag_std" }
// pending:true => show "coming soon" placeholder.
const MODELS = [
  { id:"B3h", elec:false, ready:true,  sections: SECTIONS_B3H },
  { id:"B3v", elec:false, ready:false },
  { id:"B4h", elec:false, ready:false },

];


// Merge NEW_KEYS into T (English fallback for languages without explicit new keys)
Object.keys(T).forEach(code => {
  const base = (NEW_KEYS[code] || {});
  const en   = NEW_KEYS.en;
  Object.keys(en).forEach(k => {
    if (T[code][k] === undefined) {
      T[code][k] = (base[k] !== undefined ? base[k] : en[k]);
    }
  });
});

// Supplementary header/footer strings (interval/print/doc_ref) — fallback to EN
const T_EXTRA = {
  en:{interval:"40 h · Weekly",print:"Print / PDF",doc_ref:"Maintenance schedule · 40 h"},

  de:{interval:"40 h · Wöchentlich",print:"Drucken / PDF",doc_ref:"Wartungsplan · 40 h"},
  fr:{interval:"40 h · Hebdomadaire",print:"Imprimer / PDF",doc_ref:"Plan de maintenance · 40 h"},

Object.keys(T).forEach(code => {
  const ex = T_EXTRA[code] || {};
  ['interval','print','doc_ref'].forEach(k => {

// ---------- DOM refs ----------
const modelScreen = document.getElementById('modelScreen');
const appShell    = document.getElementById('appShell');
const modelGrid   = document.getElementById('modelGrid');
const headerModel = document.getElementById('headerModel');
const footModel   = document.getElementById('footModel');
const pillName    = document.getElementById('pillName');
const modelPill   = document.getElementById('modelPill');

const langBtn     = document.getElementById('langBtn');
const langPanel   = document.getElementById('langPanel');
const currentFlag = document.getElementById('currentFlag');
const currentName = document.getElementById('currentName');
const mainContent = document.getElementById('mainContent');

// model-selection screen language selector
const msLangBtn     = document.getElementById('msLangBtn');
const msLangPanel   = document.getElementById('msLangPanel');
const msCurrentFlag = document.getElementById('msCurrentFlag');
const msCurrentName = document.getElementById('msCurrentName');

let currentLang  = 'en';
let currentModel = null;

// ---------- helpers ----------
function modelLabelHTML(id){
  // turn trailing letter into styled suffix, e.g. B3h -> B3<span>h</span>
  const m = id.match(/^([A-Za-z]+\d+)([a-z])$/);
  if (m) return m[1] + '<span class="elec">' + m[2] + '</span>';
  return id;
}

// ---------- build model selection cards ----------
MODELS.forEach(mod => {
  const card = document.createElement('button');
  card.type = 'button';
  card.className = 'model-card' + (mod.ready ? '' : ' pending');
  card.setAttribute('data-model', mod.id);
  const tagText = mod.ready ? '40 h · Weekly' : 'coming_soon_tag';
  card.innerHTML =
    '<span class="mc-name">' + modelLabelHTML(mod.id) + '</span>' +
    '<span class="mc-tag" data-modtag="' + (mod.ready?'ready':'pending') + '"></span>';
  card.onclick = () => selectModel(mod.id);
  modelGrid.appendChild(card);
});

function refreshCardTags(){
  const dict = T[currentLang] || T.en;
  document.querySelectorAll('.model-card').forEach(c => {
    const tag = c.querySelector('.mc-tag');
    const state = tag.getAttribute('data-modtag');
    tag.textContent = (state === 'ready') ? (dict.interval || '40 h · Weekly')
                                          : (dict.coming_soon || 'In preparation');
  });
}

// ---------- language dropdown ----------
function buildLangOptions(panel){
  LANGS.forEach(l => {
    const opt = document.createElement('button');
    opt.type = 'button';
    opt.className = 'lang-option';
    opt.setAttribute('data-lang', l.code);
    opt.setAttribute('role', 'option');
    opt.innerHTML = '<span class="lang-flag">' + l.flag + '</span><span>' + l.label + '</span>';
    opt.onclick = () => { setLang(l.code); closePanel(); closeMsPanel(); };
    panel.appendChild(opt);
  });
}
buildLangOptions(langPanel);
buildLangOptions(msLangPanel);

function openPanel(){ langPanel.classList.add('open'); langBtn.classList.add('open'); langBtn.setAttribute('aria-expanded','true'); }
function closePanel(){ langPanel.classList.remove('open'); langBtn.classList.remove('open'); langBtn.setAttribute('aria-expanded','false'); }
langBtn.onclick = (e) => { e.stopPropagation(); langPanel.classList.contains('open') ? closePanel() : openPanel(); };

function openMsPanel(){ msLangPanel.classList.add('open'); msLangBtn.classList.add('open'); msLangBtn.setAttribute('aria-expanded','true'); }
function closeMsPanel(){ msLangPanel.classList.remove('open'); msLangBtn.classList.remove('open'); msLangBtn.setAttribute('aria-expanded','false'); }
msLangBtn.onclick = (e) => { e.stopPropagation(); msLangPanel.classList.contains('open') ? closeMsPanel() : openMsPanel(); };

document.addEventListener('click', (e) => { if (!e.target.closest('.lang-selector')) { closePanel(); closeMsPanel(); } });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closePanel(); closeMsPanel(); } });

// ---------- render maintenance content for a model ----------
function renderModel(mod){
  const dict = T[currentLang] || T.en;
  mainContent.innerHTML = '';

  if (!mod.ready || !mod.sections){
    const cs = document.createElement('div');
    cs.className = 'coming-soon';
    cs.innerHTML =
      '<div class="cs-ico">🛠️</div>' +
      '<h2>' + (dict.coming_soon || 'Maintenance schedule in preparation') + '</h2>' +
      '<p>' + (dict.coming_soon_sub || '') + '</p>';
    mainContent.appendChild(cs);
    return;
  }

  mod.sections.forEach(sec => {
    const section = document.createElement('section');
    section.className = 'section';

    const head = document.createElement('div');
    head.className = 'section-header';
    head.innerHTML =
      '<span class="section-num">' + sec.num + '</span>' +
      '<h2 class="section-title">' + (dict[sec.title] || sec.title) + '</h2>' +
      (sec.note ? '<span class="section-note">' + (dict[sec.note] || sec.note) + '</span>' : '');
    section.appendChild(head);

    const ul = document.createElement('ul');
    ul.className = sec.legend ? 'legend' : 'items';

    sec.items.forEach(it => {
      const li = document.createElement('li');
      let html = '';
      if (it.tag) html += '<span class="tag">' + it.tag + '</span>';
      html += '<span>' + (dict[it.i18n] || it.i18n) + '</span>';
      if (it.note) html += ' <span class="li-note">— ' + (dict[it.note]||it.note).replace(/^—\s*/,'') + '</span>';
      if (it.qty)  html += '<span class="qty-badge">' + it.qty + '</span>';
      li.innerHTML = html;
      ul.appendChild(li);
    });

    section.appendChild(ul);
    mainContent.appendChild(section);
  });
}

// ---------- select / change model ----------
function selectModel(id){
  const mod = MODELS.find(m => m.id === id);
  if (!mod) return;
  currentModel = mod;
  headerModel.innerHTML = modelLabelHTML(mod.id);
  pillName.innerHTML   = modelLabelHTML(mod.id).replace(/class="elec"/g,'class="mp-elec"');
  footModel.innerHTML  = modelLabelHTML(mod.id);
  modelScreen.classList.add('hidden');
  appShell.classList.remove('hidden');
  renderModel(mod);
  applyI18n();
  const dict = T[currentLang] || T.en;
  document.title = (dict.page_title || 'Weekly Maintenance — Keestrack') + ' ' + mod.id;
  scrollTop();
}
// Reliable scroll-to-top, also on iOS Safari (waits for layout reflow)
function scrollTop(){
  const jump = () => window.scrollTo(0, 0);
  jump();
  requestAnimationFrame(() => { jump(); requestAnimationFrame(jump); });
  setTimeout(jump, 60);
}
function showModelScreen(){
  appShell.classList.add('hidden');
  modelScreen.classList.remove('hidden');
  scrollTop();
}
modelPill.onclick = showModelScreen;

// ---------- i18n apply ----------
function applyI18n(){
  const dict = T[currentLang] || T.en;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (dict[key] !== undefined) el.textContent = dict[key];
  });
  refreshCardTags();
}

function setLang(code){
  const lang = LANGS.find(l => l.code === code);
  if (!lang) return;
  currentLang = code;
  document.documentElement.lang = code;
  mainContent.dir = lang.dir;

  // re-render current model so dynamic content follows language + dir
  if (currentModel) renderModel(currentModel);
  applyI18n();

  currentFlag.textContent = lang.flag;
  currentName.textContent = lang.label;
  msCurrentFlag.textContent = lang.flag;
  msCurrentName.textContent = lang.label;
  document.querySelectorAll('.lang-option').forEach(o => {
    o.classList.toggle('active', o.getAttribute('data-lang') === code);
  });
  const dict = T[code] || T.en;
  const modSuffix = currentModel ? (' ' + currentModel.id) : '';
  document.title = (dict.page_title || 'Weekly Maintenance — Keestrack') + modSuffix;
}

const printBtn = document.getElementById('printBtn');
if (printBtn) printBtn.onclick = () => window.print();

// init
setLang('en');

</script>
